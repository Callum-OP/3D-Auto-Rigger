<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' file: blob:; connect-src 'self' file: blob:;"
    />
    <title>3D Auto Rigger</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="../node_modules/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
  <body>
    <header>
      <h1>3D Auto&nbsp;Rigger <span class="tag">v0.1 · humanoid body rig</span></h1>
    </header>

    <main>
      <section id="dropzone" class="dropzone">
        <div class="drop-inner">
          <p class="drop-title">Drop a humanoid model here</p>
          <p class="drop-sub">.glb · .gltf · .obj · .fbx</p>
          <button id="browseBtn" class="btn">Browse…</button>
          <p class="drop-or">or</p>
          <button id="testBtn" class="btn btn-ghost">Rig a test figure</button>
        </div>
      </section>

      <section class="stage">
        <div class="viewer-wrap">
          <model-viewer
            id="viewer"
            camera-controls
            autoplay
            shadow-intensity="1"
            exposure="1.0"
            environment-image="neutral"
            ar-status="not-presenting"
          ></model-viewer>
          <div id="viewerPlaceholder" class="viewer-placeholder">
            The rigged result will appear here.
          </div>
        </div>

        <aside class="panel">
          <div class="file-row">
            <span class="label">Input</span>
            <span id="inputName" class="value">— none —</span>
          </div>
          <button id="rigBtn" class="btn btn-primary" disabled>Rig model</button>
          <button id="saveBtn" class="btn" disabled>Save rigged .glb…</button>

          <div class="log-header">Pipeline log</div>
          <ol id="log" class="log"></ol>
        </aside>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
